<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>💰 Expense Tracker</h1>

        <div class="balance-box">
            <h2>Balance</h2>
            <p id="balance">$0.00</p>
        </div>

        <!-- SUMMARY SECTION -->
        <div class="summary">
            <div class="income">
                <h3>⬆ Income</h3>
                <!-- Updated by JavaScript with total of all positive transactions -->
                <p id="income">$0.00</p>
            </div>

            <div class="expense">
                <h3>⬇ Expense</h3>
                <!-- Updated by JavaScript with total of all negative transactions -->
                <p id="expense">$0.00</p>
            </div>
        </div>

        <!-- FORM SECTION-->
        <div class="form">
            <!-- Text field -->
            <input type="text" id="description" placeholder="Description (e.g. Groceries)">

            <!-- Number field -->
            <input type="number" id="amount" placeholder="Amount (e.g. 500 or -50)">

            <button onclick="addTransaction()">+ Add Transaction</button>

            <p id="error-msg" class="error-msg"></p>
        </div>

        <!-- TRANSACTION LIST -->
        <!-- JavaScript fills this list dynamically using the render() function -->
        <ul id="transactionList">
            <!-- A empty state message shown when no transactions exist -->
        </ul>

    </div>

    <!--i placed script at the bottom so the HTML loads before JavaScript runs -->
    <script src="script.js"></script>
</body>
</html>
